@if (isCalendarVisible()) {
<div class="whole_calendar"
  style="margin-left: 20px; border: 1px solid #ddd; padding: 15px; width: 320px; background: #fff; box-shadow: 0px 4px 10px rgba(0,0,0,0.1); border-radius: 6px;">
  <div id="Header_Div">
    <table style="width: 100%; border-spacing: 5px;">
      <tr>
        <td>
          <select [ngModel]="selectedLocale()" (ngModelChange)="selectedLocale.set($event); onLocaleChange()"
            style="width: 100%; padding: 6px;">
            <option value="ar-SA">Hijri</option>
            <option value="en-US">Gregorian</option>
          </select>
        </td>
        <td>
          <select [ngModel]="selectedYear()" (ngModelChange)="selectedYear.set($event); onYearChange()"
            style="width: 100%; padding: 6px;">
            @for (year of years(); track year) {
            <option [value]="year">{{ year }}</option>
            }
          </select>
        </td>
        <td>
          <select [ngModel]="selectedMonth()" (ngModelChange)="selectedMonth.set($event); onMonthChange()"
            style="width: 100%; padding: 6px;">
            @for (month of months(); track $index) {
            <option [value]="$index">{{ month }}</option>
            }
          </select>
        </td>
      </tr>
    </table>
  </div>

  <div id="clsLocCalendar" style="margin-top: 15px; text-align: center; border-top: 1px solid #eee; padding-top: 10px;">
    <!-- <label style="font-size: 13px; display:block; margin-bottom:5px; color:#555; font-weight: bold;"></label> -->
    <input type="date" (change)="onDateSelected($event)" style="padding: 6px; width: 90%; cursor: pointer;" />
  </div>
</div>
}
