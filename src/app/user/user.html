<table border="1">
    <thead>

        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Email</th>
        </tr>
    </thead>

    <tbody>

        <tr *ngFor="let user of users">
            <td>{{ user.id }}</td>
            <td>{{ user.name }}</td>
            <td>{{ user.email }}</td>
        </tr>
    </tbody>
</table>

<br>

<button (click)="prevPage()">Previous</button>
<span> Page {{ page }} </span>
<button (click)="nextPage()">Next</button>
